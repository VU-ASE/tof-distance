name: tof-distance
author: vu-ase
source: https://github.com/VU-ASE/tof-distance
version: 0.0.1
description: A small service that gets the distance measured by a time of flight sensor and outputs it as a stream 


commands:
  build: make build
  run: ./bin/tof

inputs: []

outputs: 
  - distance-first
  - distance-second

configuration:
  - name: frame-rate
    type: number
    value: 100
    tunable: true
  - name: first-channel
    type: number
    value: 0 # the value correspond to how the sensor is physically wired to the multiplexer
    tunable: false
  - name: second-channel
    type: number
    value: 1 # the value correspond to how the sensor is physically wired to the multiplexer
    tunable: false
  - name: bus
    type: number
    value: 5 # the rover's i2c bus number (it has two buses, 5 and 3)
    tunable: false
